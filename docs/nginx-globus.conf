# Replace globus.example.com, then enable this file in nginx.
# Terminate TLS with your normal certificate tooling before production use.

server {
    listen 80;
    listen [::]:80;
    server_name globus.example.com;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Voice and long agent/chat requests need a generous read timeout.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;

        # Required for the streaming voice response path.
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }
}
